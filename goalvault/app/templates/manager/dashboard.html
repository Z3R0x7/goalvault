
{% extends "base.html" %}
{% block title %}Manager Dashboard{% endblock %}
{% block content %}
<h2 class="mb-4">Team Dashboard</h2>
<div class="row g-3 mb-4">
  <div class="col-md-4"><div class="card gv-stat"><div class="card-body"><h6 class="text-muted">Team Size</h6><h2>{{ team|length }}</h2></div></div></div>
  <div class="col-md-4"><div class="card gv-stat"><div class="card-body"><h6 class="text-muted">Pending Approvals</h6><h2 class="text-warning">{{ pending_count }}</h2></div></div></div>
  <div class="col-md-4"><div class="card gv-stat"><div class="card-body"><h6 class="text-muted">Approved Goals</h6><h2 class="text-success">{{ approved_count }}</h2></div></div></div>
</div>
<a href="{{ url_for('manager.approvals') }}" class="btn btn-primary me-2">Review Approvals</a>
<a href="{{ url_for('manager.team_goals') }}" class="btn btn-outline-primary">View Team Goals</a>
{% endblock %}
